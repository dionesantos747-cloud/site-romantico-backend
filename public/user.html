<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
   <!-- 🔒 BLOQUEIO DARK MODE -->
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">

<title>Nosso site </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/css/style.css">
   
<link href="https://fonts.googleapis.com/css2?family=Keania+One&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet">
 <link href="https://fonts.googleapis.com/css2?family=Keania+One&family=Orbitron:wght@400;500&display=swap" rel="stylesheet">  
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=Rye&family=Keania+One&family=Orbitron:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">  
</head>

<body class="final">

   <!-- TELA ABRIR PRESENTE -->
<div id="giftScreen" class="gift-screen">
  <div class="gift-card">
    <h1> Você recebeu um presente!</h1>

    <div class="gift-box">
      🎁
    </div>

    <button id="openGiftBtn">Abrir presente</button>
  </div>
</div>

<!-- =====================
     PREVIEW / SITE FINAL
===================== -->
<div id="siteFinal" style="display:none;">
  <div class="preview" id="preview">

  <!-- Música (áudio invisível) -->
 <audio id="audioPlayer" preload="auto"></audio>

<div class="music-player" id="musicPlayer" style="display:none">
  <button class="play-btn" id="playBtn">▶</button>

  <div class="music-info">
    <span class="music-title">Nossa Música</span>
    <div class="progress-bar">
      <div class="progress"></div>
    </div>
  </div>
</div>

  <!-- Nome -->
  <div class="nome" id="nome"></div>

  <!-- Mensagem -->
  <div class="mensagem" id="mensagem"></div>
  <button id="lerBtn" class="ler-mais" style="display:none">
    Continuar lendo ⬇️
  </button>

  <!-- Fotos Polaroid -->
  <div class="slider">
  <div class="slider-track" id="midias"></div>
</div>

  <!-- Tempo juntos -->
  <div id="tempo"></div>

<div class="heart-container">
  <img src="/images/heart.png" class="heart-img">
  <div class="heart-name" id="heartName"></div>
</div>
     
</div>
    

  </div> <!-- FIM .preview -->
</div>   <!-- FIM #siteFinal -->

<script src="/js/user.js"></script>
</body>
</html>
