<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pagamento PIX • Aguardando</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#1a1f3c,#000);
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  background:#0d0f18;
  border-radius:20px;
  padding:28px;
  width:100%;
  max-width:420px;
  text-align:center;
  box-shadow:0 0 30px rgba(255,212,0,.2);
}

h1{
  color:#ffd400;
  margin-bottom:10px;
}

.sub{
  font-size:.95em;
  opacity:.85;
  margin-bottom:20px;
}

.info{
  margin-top:18px;
  font-size:.85em;
  opacity:.8;
  line-height:1.4;
}

.status{
  margin-top:14px;
  color:#4dff88;
  font-size:.9em;
}
</style>
</head>

<body>

<div class="card">

  <h1>Pagamento PIX</h1>

  <div class="sub">
    Após o pagamento, estamos confirmando automaticamente...
  </div>

  <div class="info">
    • Abra o app do seu banco<br>
    • Realize o pagamento via PIX<br>
    • Aguarde a confirmação automática<br><br>
    Você será redirecionado assim que for aprovado ✨
  </div>

  <div class="status" id="status">
    ⏳ Aguardando confirmação do pagamento...
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const paymentId = params.get("payment_id");

if (!paymentId) {
  document.body.innerHTML = `
    <div style="color:#fff;text-align:center;padding:40px">
      <h2>❌ Pagamento inválido</h2>
      <p>Link incorreto ou expirado.</p>
    </div>
  `;
  throw new Error("payment_id ausente");
}

let polling = true;

async function verificarPagamento() {
  if (!polling) return;

  try {
    const res = await fetch(`/check-payment?payment_id=${paymentId}`);
    const data = await res.json();

    if (data.status === "approved") {

      polling = false;

      document.getElementById("status").innerText =
        "✅ Pagamento aprovado! Redirecionando...";

      // limpa editor
      localStorage.removeItem("romantico_editor_state");

      setTimeout(() => {
        window.location.href =
          `/success.html?payment_id=${paymentId}`;
      }, 1200);
    }

  } catch (err) {
    console.log("erro check:", err);
  }
}

// verifica a cada 3 segundos (leve)
setInterval(verificarPagamento, 3000);
</script>

</body>
</html>
