<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  
<title>Abrir no navegador</title>

<style>
body{
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
padding:30px;
margin:0;
}

h2{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:.8;
max-width:320px;
line-height:1.5;
}

.btn{
display:inline-block;
margin-top:30px;
padding:18px 42px;
font-size:18px;
border-radius:14px;
background:linear-gradient(90deg,#ff2ad4,#ff7af6);
color:#fff;
text-decoration:none;
font-weight:bold;
}

.info{
margin-top:25px;
font-size:14px;
opacity:.6;
}
</style>

</head>

<body>

<h2>Abra no navegador</h2>

<p>
Para adicionar fotos e música,<br>
abra este site no navegador do celular.
</p>

<!-- botão que abre diretamente no Chrome -->
<a class="btn"
href="intent://memoryit.com.br#Intent;scheme=https;package=com.android.chrome;end">
Abrir no navegador
</a>

<div class="info">
Toque nos <b>3 pontos</b> no canto superior direito<br>
e escolha <b>"Abrir no navegador"</b> se o botão não funcionar.
</div>

</body>
</html>
