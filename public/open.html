<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Abrir no navegador</title>

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
padding:30px;
text-align:center;
}

/* seta apontando para os 3 pontinhos */

.arrow-box{
position:fixed;
top:15px;
right:15px;
text-align:center;
animation:bounce 1s infinite;
}

.arrow{
font-size:46px;
}

.arrow-text{
font-size:14px;
opacity:.9;
margin-top:4px;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

h2{
font-size:30px;
margin-bottom:14px;
}

p{
opacity:.9;
max-width:340px;
line-height:1.6;
}

.highlight{
color:#ff7af6;
font-weight:bold;
}

.info{
margin-top:28px;
padding:18px;
border-radius:14px;
background:#111;
border:1px solid #333;
max-width:340px;
font-size:15px;
opacity:.95;
}

.steps{
margin-top:18px;
line-height:1.8;
font-size:16px;
}

.steps strong{
color:#ff7af6;
}

</style>

<script>

const ua = navigator.userAgent.toLowerCase();

/* se NÃO for TikTok redireciona automaticamente */

if(!ua.includes("tiktok") && !ua.includes("musical_ly") && !ua.includes("bytedance")){

window.location.href = "https://memoryit.com.br";

}

</script>

</head>

<body>

<!-- seta apontando para os 3 pontinhos -->

<div class="arrow-box">
<div class="arrow">⬆️</div>
<div class="arrow-text">3 pontinhos</div>
</div>

<h2>Abra no navegador</h2>

<p>
Para criar seu site você precisa usar o <span class="highlight">navegador do celular</span>.
</p>

<p>
O navegador do TikTok bloqueia algumas funções importantes como:
</p>

<div class="steps">
📷 adicionar fotos<br>
🎵 tocar música
</div>

<div class="info">
Toque nos <strong>3 pontinhos</strong> no canto superior direito<br>
e depois em <strong>"Abrir no navegador"</strong>.
</div>

</body>
</html>
