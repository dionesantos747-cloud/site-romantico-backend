<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Abrindo...</title>

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
padding-top:90px;
}

button{
margin-top:30px;
padding:18px 40px;
font-size:18px;
border-radius:12px;
border:none;
background:#ff2ad4;
color:#fff;
}

</style>

</head>

<body>

<h2>Abrindo site...</h2>

<p>
Se não abrir automaticamente,<br>
toque no botão abaixo
</p>

<button onclick="abrir()">
Abrir site
</button>

<script>

const url = "https://site-romantico-backend.onrender.com";

function abrir(){

if(/android/i.test(navigator.userAgent)){

window.location.href =
"googlechrome://" +
url.replace(/^https?:\/\//,'');

setTimeout(()=>{
window.location.href = url;
},1500);

}
else{

window.location.href = url;

}

}

/* tenta abrir automaticamente */

setTimeout(abrir,300);

</script>

</body>
</html>
