<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Abrindo site...</title>

<style>

body{
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
padding-top:90px;
margin:0;
}

h2{
font-size:28px;
margin-bottom:10px;
}

p{
opacity:.8;
line-height:1.5;
}

.btn{
display:inline-block;
margin-top:35px;
padding:18px 40px;
font-size:18px;
border-radius:14px;
background:linear-gradient(90deg,#ff2ad4,#ff7af6);
color:#fff;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Abrindo site...</h2>

<p>
Se não abrir automaticamente,<br>
toque no botão abaixo
</p>

<a id="openChrome" class="btn">
Abrir no navegador
</a>

<script>

/* pega o id da URL */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* monta o link final */
const url = window.location.origin + "/?id=" + id;

/* botão */
const link = document.getElementById("openChrome");

/* Android → tentar abrir no Chrome */
if(/android/i.test(navigator.userAgent)){

link.href =
"intent://" +
url.replace(/^https?:\/\//,'') +
"#Intent;scheme=https;package=com.android.chrome;end";

}

/* iPhone ou outros */
else{

link.href = url;

}

</script>

</body>
</html>
